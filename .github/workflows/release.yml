name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example v2.16.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable app
        run: npm run build:portable

      - name: Find release asset
        id: asset
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path dist -Filter '*.exe' | Select-Object -First 1
          if (-not $file) { throw 'Portable EXE was not generated.' }
          "path=$($file.FullName)" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          RELEASE_ASSET: ${{ steps.asset.outputs.path }}
        shell: pwsh
        run: |
          if (gh release view $env:RELEASE_TAG 2>$null) {
            gh release upload $env:RELEASE_TAG $env:RELEASE_ASSET --clobber
          } else {
            gh release create $env:RELEASE_TAG $env:RELEASE_ASSET --title "MissAV Manager $env:RELEASE_TAG" --generate-notes
          }
