name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable app
        run: npm run build:portable

      - name: Find release asset
        id: asset
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path dist -Filter '*.exe' | Select-Object -First 1
          if (-not $file) { throw 'Portable EXE was not generated.' }
          "path=$($file.FullName)" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} "${{ steps.asset.outputs.path }}" --title "MissAV Manager ${{ github.ref_name }}" --generate-notes
